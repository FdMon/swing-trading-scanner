name: Deploy Scanner Dashboard

on:
  schedule:
    # Se ejecuta todos los días a las 20:15 UTC (22:15 en España peninsular)
    - cron: '15 20 * * *'
  workflow_dispatch: # Permite ejecutar el flujo manualmente desde la pestaña Actions en GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-module-version: '3.10'
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Market Scanner
        run: |
          python scanner/scanner.py

      - name: Commit updated opportunities.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json dashboard/public/data/opportunities.json || true
          git commit -m "data: auto-update market scan data" || true
          git push origin main || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Node.js dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Next.js Static Web
        run: |
          cd dashboard
          npm run build

      - name: Deploy Static Web to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dashboard/out # Carpeta que genera Next.js con el export estático
          branch: gh-pages # Rama donde se publicará la web
          clean: true
